name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm ci --prefix webview-ui
      - run: npm run protos
      # Match publish workflows: full webview build (tsc project refs + Vite), not tsc-only
      - run: npm run build:webview
