# Publishes to the Visual Studio Marketplace when you publish a GitHub Release.
# Prereqs: repo secret VSCE_PAT = Azure DevOps PAT with Marketplace (Manage) scope.
# package.json "publisher" must match your Marketplace publisher ID.

name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run compile
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --readme-path README.vsix.md
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
