<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Fetch Coder</title>
  <desc id="desc">Banner for the Fetch Coder VS Code extension — AI coding assistant powered by ASI1</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0d2040"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.4" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <circle cx="1020" cy="60" r="140" fill="#22d3ee" opacity="0.04"/>
  <circle cx="1060" cy="100" r="80" fill="#818cf8" opacity="0.05"/>
  <circle cx="150" cy="280" r="100" fill="#a78bfa" opacity="0.04"/>

  <path d="M0 280 Q300 250 600 268 T1200 255 L1200 320 L0 320 Z" fill="#0c1829" opacity="0.8"/>

  <!-- Graduation cap icon (simplified) -->
  <g transform="translate(72 70)" filter="url(#glow)">
    <polygon points="30,8 0,22 30,36 60,22" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="30" y1="36" x2="30" y2="52" stroke="url(#accent)" stroke-width="2"/>
    <path d="M14 28 L14 42 Q22 50 30 50 Q38 50 46 42 L46 28" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="30" cy="52" r="3" fill="#22d3ee" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="150" y="115" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="48" font-weight="800" fill="#f1f5f9" letter-spacing="-0.02em">Fetch Coder</text>

  <!-- Version badge -->
  <g transform="translate(488 92)">
    <rect width="52" height="22" rx="11" fill="#818cf8" opacity="0.2"/>
    <text x="26" y="15" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" fill="#818cf8" text-anchor="middle" font-weight="600">v0.1.6</text>
  </g>

  <!-- Subtitle -->
  <text x="72" y="170" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#94a3b8">AI Coding Assistant for VS Code &amp; Cursor — powered by ASI1</text>

  <!-- Feature tags -->
  <g transform="translate(72 200)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#22d3ee" opacity="0.12"/>
    <text x="45" y="17" font-family="ui-monospace, monospace" font-size="12" fill="#22d3ee" text-anchor="middle" font-weight="500">Chat</text>

    <rect x="100" y="0" width="130" height="26" rx="13" fill="#818cf8" opacity="0.12"/>
    <text x="165" y="17" font-family="ui-monospace, monospace" font-size="12" fill="#818cf8" text-anchor="middle" font-weight="500">Inline Edit</text>

    <rect x="240" y="0" width="90" height="26" rx="13" fill="#a78bfa" opacity="0.12"/>
    <text x="285" y="17" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="500">Tools</text>

    <rect x="340" y="0" width="130" height="26" rx="13" fill="#22d3ee" opacity="0.12"/>
    <text x="405" y="17" font-family="ui-monospace, monospace" font-size="12" fill="#22d3ee" text-anchor="middle" font-weight="500">Web Search</text>

    <rect x="480" y="0" width="120" height="26" rx="13" fill="#818cf8" opacity="0.12"/>
    <text x="540" y="17" font-family="ui-monospace, monospace" font-size="12" fill="#818cf8" text-anchor="middle" font-weight="500">Terminal</text>

    <rect x="610" y="0" width="130" height="26" rx="13" fill="#a78bfa" opacity="0.12"/>
    <text x="675" y="17" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="500">Auto Apply</text>
  </g>

  <!-- Accent line -->
  <rect x="72" y="252" width="340" height="4" rx="2" fill="url(#accent)" opacity="0.85"/>

  <!-- Fetch.ai ecosystem text -->
  <text x="72" y="285" font-family="ui-monospace, SFMono-Regular, monospace" font-size="13" fill="#475569">Streaming · Markdown · Tool Calling · Fetch.ai Ecosystem</text>
</svg>
