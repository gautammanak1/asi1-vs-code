<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">ASI1 Code</title>
  <desc id="desc">Banner for the ASI1 Code VS Code extension</desc>
  <defs>
    <linearGradient id="readme-banner-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="55%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="readme-banner-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="readme-banner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="readme-banner-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.35"/>
    </pattern>
  </defs>
  <rect width="1200" height="320" fill="url(#readme-banner-bg)"/>
  <rect width="1200" height="320" fill="url(#readme-banner-grid)"/>
  <circle cx="980" cy="80" r="120" fill="#22d3ee" opacity="0.06"/>
  <circle cx="200" cy="260" r="90" fill="#f59e0b" opacity="0.05"/>
  <path d="M0 280 Q300 240 600 265 T1200 250 L1200 320 L0 320 Z" fill="#0c1829" opacity="0.85"/>
  <g transform="translate(72 88)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#111f33" stroke="url(#readme-banner-accent)" stroke-width="2"/>
    <path d="M18 38 L28 18 L38 38 M22 32 h16" stroke="url(#readme-banner-accent)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#readme-banner-glow)"/>
    <text x="76" y="40" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="42" font-weight="800" fill="#f1f5f9" letter-spacing="-0.03em">ASI1 Code</text>
  </g>
  <text x="72" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" fill="#94a3b8">Sidebar AI chat for VS Code &#8212; powered by ASI1</text>
  <text x="72" y="238" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#64748b">Streaming &#183; Markdown &#183; Workspace file hints &#183; Fetch.ai ecosystem</text>
  <rect x="72" y="258" width="280" height="4" rx="2" fill="url(#readme-banner-accent)" opacity="0.9"/>
</svg>
